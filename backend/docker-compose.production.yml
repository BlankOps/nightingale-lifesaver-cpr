version: '3.9'

services:
  cpr-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-unknown}
        VERSION: ${VERSION:-1.0.0}
    container_name: cpr-chatbot-production
    
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    
    # Environment configuration
    environment:
      # Rasa Configuration
      RASA_PORT: 5005
      RASA_HOST: 0.0.0.0
      RASA_CWD: /app/src/rasa
      RASA_CORS: "http://localhost:3000,http://localhost:3001"
      RASA_LOG_LEVEL: INFO
      
      # Analytics Configuration
      ANALYTICS_PORT: 3000
      ANALYTICS_HOST: 0.0.0.0
      NODE_ENV: production
      NODE_LOG_FORMAT: json
      
      # Health Check Configuration
      RASA_API_URL: http://localhost:5005
      ANALYTICS_API_URL: http://localhost:3000
      
      # Logging
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      STRUCTURED_LOGGING: 'true'
      
      # Application
      DEBUG: 'false'
      ENVIRONMENT: production
    
    # Port mappings
    ports:
      - "5005:5005"  # Rasa API
      - "3000:3000"  # Analytics UI
    
    # Volume mounts for logs
    volumes:
      - ./logs:/app/logs
      - ./cpr-chatbot/models:/app/src/rasa/models
    
    # Health check configuration
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py", "startup"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart policy
    restart: unless-stopped
    
    # Logging driver configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        labels: "service=cpr-chatbot"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Network configuration
    networks:
      - cpr-network
    
    # Labels for monitoring and organization
    labels:
      com.example.description: "CPR Chatbot with Rasa and Analytics"
      com.example.version: ${VERSION:-1.0.0}
      com.example.environment: production

networks:
  cpr-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Docker Compose override file for development
# Use: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
