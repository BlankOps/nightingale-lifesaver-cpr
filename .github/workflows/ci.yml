# CI trigger check

name: CI - CPR Monorepo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, feature/dockerfile-updates]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  analytics:
    name: Test and build analytics frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/cpr-chatbot/analytics
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('backend/cpr-chatbot/analytics/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/cpr-chatbot/analytics/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build analytics app
        run: npm run build

      - name: Production build check
        run: NODE_ENV=production npm run build

  chatbot:
    name: Test and build chatbot (cpr-chatbot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/cpr-chatbot
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run lint (flake8)
        run: flake8 . --exclude=rasa310_env,.pytest_cache,.config,.keras --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false

      - name: Run tests
        run: |
          TEST_ARGS="--ignore=rasa310_env --ignore=.pytest_cache --ignore=.config --ignore=.keras"
          if python -m pytest --collect-only --quiet $TEST_ARGS | grep -q "collected 0 items"; then
            echo "No Python tests found; skipping pytest"
          else
            python -m pytest --cov=. --cov-report=xml $TEST_ARGS
          fi
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: chatbot
          name: codecov-umbrella
        continue-on-error: true

  intent-generator:
    name: Test and build intent generator frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/cpr-chatbot-intent-generator
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('backend/cpr-chatbot-intent-generator/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/cpr-chatbot-intent-generator/package.json

      - name: Install dependencies
        run: npm install

      - name: Build intent generator app
        run: npm run build

  deploy-chatbot:
    name: Deploy chatbot to AWS ECS
    runs-on: ubuntu-latest
    needs: [analytics, chatbot, intent-generator]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      ECR_REPOSITORY: cpr-chatbot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set build metadata
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ github.sha }}
            VERSION=1.0.0

      - name: Render ECS task definition
        run: |
          python - <<'PY'
          import os
          with open('backend/ecs-task-definition.template.json') as f:
              template = f.read()
          replacements = {
              '{{IMAGE_URI}}': f"{os.environ['ECR_REGISTRY']}/{os.environ['ECR_REPOSITORY']}:latest",
              '{{TASK_ROLE_ARN}}': os.environ['AWS_ECS_TASK_ROLE_ARN'],
              '{{EXECUTION_ROLE_ARN}}': os.environ['AWS_ECS_EXECUTION_ROLE_ARN'],
              '{{DB_HOST_SECRET_ARN}}': os.environ['DB_HOST_SECRET_ARN'],
              '{{DB_USER_SECRET_ARN}}': os.environ['DB_USER_SECRET_ARN'],
              '{{DB_PASSWORD_SECRET_ARN}}': os.environ['DB_PASSWORD_SECRET_ARN'],
              '{{DB_NAME_SECRET_ARN}}': os.environ['DB_NAME_SECRET_ARN'],
              '{{AWS_REGION}}': os.environ['AWS_REGION'],
          }
          for key, value in replacements.items():
              template = template.replace(key, value)
          with open('backend/ecs-task-definition.json', 'w') as out:
              out.write(template)
          PY

      - name: Register ECS task definition
        run: aws ecs register-task-definition --cli-input-json file://backend/ecs-task-definition.json

      - name: Deploy to ECS service
        run: |
          aws ecs update-service --cluster "${{ secrets.AWS_ECS_CLUSTER }}" --service "${{ secrets.AWS_ECS_SERVICE }}" --force-new-deployment

      - name: Verify ECS deployment
        run: |
          TASK_COUNT=$(aws ecs describe-services --cluster "${{ secrets.AWS_ECS_CLUSTER }}" --services "${{ secrets.AWS_ECS_SERVICE }}" --query 'services[0].runningCount' --output text)
          if [ "$TASK_COUNT" = "0" ]; then
            echo "ECS service has no running tasks"
            exit 1
          fi
          echo "ECS service is running with $TASK_COUNT task(s)"
