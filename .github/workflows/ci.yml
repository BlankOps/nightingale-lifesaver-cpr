name: CI - CPR Monorepo

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Test and build React (cpr_project)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpr_project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build React app
        run: npm run build

  chatbot:
    name: Basic analysis of the chatbot (cpr-chatbot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpr-chatbot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Files list
        run: ls -la

      - name: Code analysis (placeholder)
        run: echo "Tests placeholder"
  intent-generator:
    name: Basic Analysis of the intent generator (cpr-chatbot-intent-generator)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpr-chatbot-intent-generator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Files list
        run: ls -la

